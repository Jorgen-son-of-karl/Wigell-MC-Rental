spring.application.name=WigellMcRental
spring.datasource.url=jdbc:mysql://localhost:3306/wigell_mc_db
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

server.port=8585

logging.level.root=INFO
logging.level.com.karlsson.wigellmcrental=DEBUG

#dashboard
spring.boot.admin.client.url=http://localhost:9090/

spring.boot.admin.client.instance.service-url=http://localhost:8583/
spring.boot.admin.client.instance.management-url=http://localhost:8583/actuator
spring.boot.admin.client.instance.health-url=http://localhost:8583/actuator/health

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always


spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ACTUATOR